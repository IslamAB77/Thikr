<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThikrIslam</title>
  <link rel="icon" href="ChatGPT Image 14. Mai 2025, 01_29_57.png" type="image/png" />
  <link rel="manifest" href="/manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    }
  </script>
  <style>
    :root {
      --bg-a: #03261e;
      --bg-b: #0f766e;
      --bg-c: #6ee7b7;
      --panel: rgba(255, 255, 255, 0.16);
      --panel-border: rgba(255, 255, 255, 0.32);
      --text-main: #f8fffc;
      --text-soft: rgba(248, 255, 252, 0.82);
      --accent: #fef3c7;
      --accent-strong: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
      padding: 1rem;
      background:
        radial-gradient(1000px 500px at 10% -5%, rgba(255, 255, 255, 0.14), transparent 60%),
        radial-gradient(900px 420px at 100% 110%, rgba(255, 255, 255, 0.15), transparent 55%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b) 55%, var(--bg-c));
      color: var(--text-main);
      font-family: "Consolas", "Menlo", monospace;
      user-select: none;
    }

    .app {
      width: min(840px, 100%);
      max-height: calc(100vh - 2rem);
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 0.8rem;
      padding: 1rem;
      border-radius: 1.25rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    }

    .title {
      text-align: center;
      font-size: clamp(1.25rem, 3.3vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0;
    }

    .subtitle {
      text-align: center;
      color: var(--text-soft);
      margin: 0;
      font-size: 0.95rem;
    }

    .dhikr-name {
      text-align: center;
      font-size: clamp(1rem, 2.8vw, 1.22rem);
      font-weight: 700;
      color: var(--accent);
      min-height: 1.8rem;
      margin: 0;
    }

    .dhikr-text {
      overflow-y: auto;
      padding: 0.9rem;
      border-radius: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.18);
      line-height: 1.85;
      text-align: center;
      font-size: clamp(1.2rem, 4vw, 1.9rem);
      direction: rtl;
      margin: 0;
      min-height: 7.8rem;
    }

    .counter {
      text-align: center;
      margin: 0;
      font-size: clamp(1.2rem, 5vw, 2.15rem);
      font-weight: 700;
    }

    .progress-wrap {
      width: 100%;
      height: 0.85rem;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.2);
    }

    .progress-fill {
      height: 100%;
      width: 0;
      transition: width 180ms ease;
      background: linear-gradient(90deg, #fef9c3, #fde68a, #f59e0b);
    }

    .tap-area {
      border: none;
      width: 100%;
      padding: 0.95rem;
      border-radius: 1rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.22));
      color: #07271f;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.22);
    }

    .tap-area:active {
      transform: translateY(1px);
    }

    .actions {
      display: flex;
      gap: 0.55rem;
    }

    .btn {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.14);
      color: var(--text-main);
      border-radius: 0.82rem;
      padding: 0.62rem 0.8rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .btn.warn {
      border-color: rgba(245, 158, 11, 0.65);
      color: #fff7e8;
      background: rgba(180, 83, 9, 0.28);
    }

    @media (max-width: 640px) {
      .app {
        padding: 0.8rem;
        gap: 0.65rem;
      }
      .actions {
        flex-direction: column;
      }
      .tap-area {
        padding: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">﷽ Adhkār nach dem Salāh</h1>
    <p class="subtitle">Ein Tipp auf den großen Button zählt genau 1x.</p>

    <p class="dhikr-name" id="dhikrName">Laden...</p>
    <p class="dhikr-text" id="dhikrText"></p>

    <p class="counter" id="counter">0 / 0</p>
    <div class="progress-wrap" aria-hidden="true">
      <div class="progress-fill" id="progress"></div>
    </div>

    <button class="tap-area" id="tapArea" type="button">Tippen zum Zählen</button>

    <div class="actions">
      <button class="btn" id="undoBtn" type="button">Zurück (1)</button>
      <button class="btn" id="nextBtn" type="button">Überspringen</button>
      <button class="btn warn" id="resetBtn" type="button">Alles zurücksetzen</button>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'postSalahAthkarState_v3';

    const TEXT_IKHLAS = 'قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ ﴿٤﴾';
    const TEXT_FALAQ = 'قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ﴿١﴾ مِن شَرِّ مَا خَلَقَ ﴿٢﴾ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ﴿٣﴾ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ﴿٤﴾ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ ﴿٥﴾';
    const TEXT_NAS = 'قُلْ أَعُوذُ بِرَبِّ النَّاسِ ﴿١﴾ مَلِكِ النَّاسِ ﴿٢﴾ إِلَـٰهِ النَّاسِ ﴿٣﴾ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ﴿٤﴾ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ﴿٥﴾ مِنَ الْجِنَّةِ وَالنَّاسِ ﴿٦﴾';
    const TEXT_AYAT_KURSI = 'اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ';

    const POST_SALAH_LIST_TEMPLATE = [
      { name: 'Allahu Akbar', target: 1, text: 'اللّٰهُ أَكْبَرُ' },
      { name: 'Astaghfirullah (3x)', target: 3, text: 'أَسْتَغْفِرُ اللّٰهَ' },
      { name: 'Allahumma anta as-Salam', target: 1, text: 'اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ' },
      { name: 'La ilaha illallah wahdahu...', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ' },
      { name: 'Allahumma la maniʿa lima aʿtayt...', target: 1, text: 'اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ وَلَا مُعْطِيَ لِمَا مَنَعْتَ وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدُّ' },
      { name: 'La hawla wa la quwwata illa billah', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ لَا إِلَهَ إِلَّا اللَّهُ وَلَا نَعْبُدُ إِلَّا إِيَّاهُ لَهُ النِّعْمَةُ وَلَهُ الْفَضْلُ وَلَهُ الثَّنَاءُ الْحَسَنُ لَا إِلَهَ إِلَّا اللَّهُ مُخْلِصِينَ لَهُ الدِّينَ وَلَوْ كَرِهَ الْكَافِرُونَ' },
      { name: 'Subhanallah (33x)', target: 33, text: 'سُبْحَانَ اللَّهِ' },
      { name: 'Alhamdulillah (33x)', target: 33, text: 'الْحَمْدُ لِلَّهِ' },
      { name: 'Allahu Akbar (34x)', target: 34, text: 'اللَّهُ أَكْبَرُ' },
      { name: 'Abschluss-Dhikr', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ' },
      { name: 'Ayat al-Kursi', target: 1, text: TEXT_AYAT_KURSI },
      { name: 'Surah al-Ikhlas (normal 1x)', target: 1, text: TEXT_IKHLAS },
      { name: 'Surah al-Falaq (normal 1x)', target: 1, text: TEXT_FALAQ },
      { name: 'Surah an-Nas (normal 1x)', target: 1, text: TEXT_NAS },
      { name: 'Allahumma aʿinni ʿala dhikrika...', target: 1, text: 'اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ' },
      { name: 'Rabbi qini ʿadhabaka...', target: 1, text: 'رَبِّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ' },
      { name: 'Allahumma ighfir li ma qaddamtu...', target: 1, text: 'اللَّهُمَّ اغْفِرْ لِي مَا قَدَّمْتُ وَمَا أَخَّرْتُ وَمَا أَسْرَرْتُ وَمَا أَعْلَنْتُ وَمَا أَنْتَ أَعْلَمُ بِهِ مِنِّي أَنْتَ الْمُقَدِّمُ وَأَنْتَ الْمُؤَخِّرُ لَا إِلَٰهَ إِلَّا أَنْتَ' },
      { name: 'Subhanaka Allahumma wa bihamdik', target: 1, text: 'سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ أَسْتَغْفِرُكَ وَأَتُوبُ إِلَيْكَ' },
      { name: 'Rabbi ighfir li wa tub ʿalayya', target: 1, text: 'رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ إِنَّكَ أَنْتَ التَّوَّابُ الْغَفُورُ' }
    ];

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function createFreshState() {
      const list = deepClone(POST_SALAH_LIST_TEMPLATE);
      for (const item of list) item.current = 0;
      return { currentIndex: 0, list };
    }

    function safeParse(json) {
      try {
        return JSON.parse(json);
      } catch {
        return null;
      }
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? safeParse(raw) : null;
      if (!parsed || !Array.isArray(parsed.list)) {
        return createFreshState();
      }

      const fresh = createFreshState();
      if (parsed.list.length !== fresh.list.length) return fresh;

      let index = Number.isInteger(parsed.currentIndex) ? parsed.currentIndex : 0;
      index = Math.max(0, Math.min(index, fresh.list.length));

      for (let i = 0; i < fresh.list.length; i += 1) {
        const val = Number(parsed.list[i]?.current);
        fresh.list[i].current = Number.isFinite(val)
          ? Math.max(0, Math.min(Math.floor(val), fresh.list[i].target))
          : 0;
      }

      fresh.currentIndex = index;
      while (
        fresh.currentIndex < fresh.list.length &&
        fresh.list[fresh.currentIndex].current >= fresh.list[fresh.currentIndex].target
      ) {
        fresh.currentIndex += 1;
      }

      return fresh;
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.warn('State could not be saved', err);
      }
    }

    function computeProgressPercent() {
      const total = state.list.length;
      if (!total) return 0;

      const idx = state.currentIndex;
      if (idx >= total) return 100;

      const active = state.list[idx];
      const itemFraction = active.target > 0 ? (active.current / active.target) : 0;
      return Math.max(0, Math.min(100, ((idx + itemFraction) / total) * 100));
    }

    function render() {
      const nameEl = document.getElementById('dhikrName');
      const textEl = document.getElementById('dhikrText');
      const counterEl = document.getElementById('counter');
      const progressEl = document.getElementById('progress');

      if (state.currentIndex >= state.list.length) {
        nameEl.textContent = 'Abgeschlossen';
        textEl.textContent = 'تقبل الله';
        counterEl.textContent = 'Masha Allah';
        progressEl.style.width = '100%';
        return;
      }

      const active = state.list[state.currentIndex];
      nameEl.textContent = active.name;
      textEl.textContent = active.text;
      counterEl.textContent = `${active.current} / ${active.target}`;
      progressEl.style.width = `${computeProgressPercent().toFixed(2)}%`;
    }

    function incrementOnce() {
      if (state.currentIndex >= state.list.length) {
        if (navigator.vibrate) navigator.vibrate(22);
        return;
      }

      const active = state.list[state.currentIndex];
      if (active.current < active.target) {
        active.current += 1;
      }

      if (active.current >= active.target) {
        state.currentIndex += 1;
      }

      saveState();
      render();
      if (navigator.vibrate) navigator.vibrate(16);
    }

    function undoOnce() {
      if (state.currentIndex >= state.list.length) {
        state.currentIndex = state.list.length - 1;
      }

      const idx = Math.max(0, state.currentIndex);
      const active = state.list[idx];

      if (active.current > 0) {
        active.current -= 1;
      } else if (idx > 0) {
        state.currentIndex = idx - 1;
        const prev = state.list[state.currentIndex];
        prev.current = Math.max(0, prev.current - 1);
      }

      saveState();
      render();
    }

    function skipCurrent() {
      if (state.currentIndex >= state.list.length) return;
      const active = state.list[state.currentIndex];
      active.current = active.target;
      state.currentIndex += 1;
      saveState();
      render();
    }

    function resetAll() {
      state = createFreshState();
      saveState();
      render();
    }

    let state = loadState();

    const tapArea = document.getElementById('tapArea');
    const undoBtn = document.getElementById('undoBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    let lastPointerTs = 0;
    tapArea.addEventListener('pointerdown', (ev) => {
      if (ev.button !== 0) return;
      const now = performance.now();
      if (now - lastPointerTs < 120) return;
      lastPointerTs = now;
      ev.preventDefault();
      incrementOnce();
    }, { passive: false });

    undoBtn.addEventListener('click', undoOnce);
    nextBtn.addEventListener('click', skipCurrent);
    resetBtn.addEventListener('click', resetAll);

    render();
  </script>
</body>
</html>
