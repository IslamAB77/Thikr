<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThikrIslam</title>
  <link rel="icon" href="ChatGPT Image 14. Mai 2025, 01_29_57.png" type="image/png" />
  <link rel="manifest" href="/manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW failed:', err));
    }
  </script>
  <style>
    :root {
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.14);
      --glass-2: rgba(255, 255, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      gap: 0.8rem;
      padding: 1rem;
      overflow: hidden;
      user-select: none;
      color: var(--white);
      font-family: Consolas, Menlo, monospace;
      background:
        radial-gradient(900px 420px at 5% 0%, rgba(255, 255, 255, 0.15), transparent 60%),
        radial-gradient(700px 380px at 100% 100%, rgba(255, 255, 255, 0.1), transparent 55%),
        linear-gradient(to bottom, #064e3b, #0f766e 55%, #34d399);
    }

    .bismillah {
      font-size: clamp(2rem, 8vw, 3rem);
      text-align: center;
      color: var(--white);
      margin: 0;
    }

    .mode-switch {
      display: inline-flex;
      gap: 0.45rem;
      padding: 0.35rem;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-2);
      backdrop-filter: blur(5px);
    }

    .mode-btn {
      border: none;
      background: transparent;
      color: var(--white);
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .mode-btn.active {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }

    .dhikr-text {
      width: min(860px, 92vw);
      max-height: 36vh;
      overflow-y: auto;
      padding: 0.85rem 1rem;
      border-radius: 0.9rem;
      background: var(--glass);
      border: 1px solid var(--glass-2);
      font-size: clamp(1.15rem, 4.2vw, 1.9rem);
      line-height: 1.75;
      text-align: center;
      color: var(--white);
      direction: rtl;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .dhikr-text::-webkit-scrollbar {
      display: none;
    }

    .counter {
      font-size: clamp(2rem, 9vw, 4.2rem);
      color: var(--white);
      margin: 0;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .progress-bar {
      width: min(860px, 92vw);
      height: 0.95rem;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: #ffffff;
      transition: width 180ms ease;
    }

    .hint {
      margin: 0;
      text-align: center;
      color: var(--white);
      opacity: 0.92;
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      body {
        justify-content: space-around;
      }

      .dhikr-text {
        max-height: 33vh;
      }
    }
  </style>
</head>
<body>
  <p class="bismillah">﷽</p>

  <div class="mode-switch">
    <button class="mode-btn active" id="normalBtn" type="button">عادي</button>
    <button class="mode-btn" id="salahBtn" type="button">بعد الصلاة</button>
  </div>

  <div class="dhikr-text" id="dhikrText">سُبْحَانَ ٱللَّٰهِ</div>

  <p class="counter" id="counter">0 / 100</p>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <script>
    const TEXT_IKHLAS = 'قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ ﴿٤﴾';
    const TEXT_FALAQ = 'قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ﴿١﴾ مِن شَرِّ مَا خَلَقَ ﴿٢﴾ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ﴿٣﴾ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ﴿٤﴾ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ ﴿٥﴾';
    const TEXT_NAS = 'قُلْ أَعُوذُ بِرَبِّ النَّاسِ ﴿١﴾ مَلِكِ النَّاسِ ﴿٢﴾ إِلَـٰهِ النَّاسِ ﴿٣﴾ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ﴿٤﴾ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ﴿٥﴾ مِنَ الْجِنَّةِ وَالنَّاسِ ﴿٦﴾';
    const TEXT_AYAT_KURSI = 'اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ';

    const SALAH_TEMPLATE = [
      { name: 'Allāhu Akbar', target: 1, text: 'اللّٰهُ أَكْبَرُ' },
      { name: 'Astaghfirullāh', target: 3, text: 'أَسْتَغْفِرُ اللّٰهَ' },
      { name: 'Allāhumma anta as-Salām...', target: 1, text: 'اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ' },
      { name: 'Lā ilāha illAllāh waḥdahū...', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ' },
      { name: 'Allāhumma lā māniʿa limā aʿṭayt...', target: 1, text: 'اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ وَلَا مُعْطِيَ لِمَا مَنَعْتَ وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدُّ' },
      { name: 'Lā ḥawla wa lā quwwata illā billāh', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ لَا إِلَهَ إِلَّا اللَّهُ وَلَا نَعْبُدُ إِلَّا إِيَّاهُ لَهُ النِّعْمَةُ وَلَهُ الْفَضْلُ وَلَهُ الثَّنَاءُ الْحَسَنُ لَا إِلَهَ إِلَّا اللَّهُ مُخْلِصِينَ لَهُ الدِّينَ وَلَوْ كَرِهَ الْكَافِرُونَ' },
      { name: 'SubḥānAllāh', target: 33, text: 'سُبْحَانَ اللَّهِ' },
      { name: 'Alḥamdulillāh', target: 33, text: 'الْحَمْدُ لِلَّهِ' },
      { name: 'Allāhu Akbar', target: 34, text: 'اللَّهُ أَكْبَرُ' },
      { name: 'Lā ilāha illAllāh (Abschluss)', target: 1, text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ' },
      { name: 'Āyat al-Kursī', target: 1, text: TEXT_AYAT_KURSI },
      { name: 'Sūrat al-Ikhlāṣ', target: 1, text: TEXT_IKHLAS },
      { name: 'Sūrat al-Falaq', target: 1, text: TEXT_FALAQ },
      { name: 'Sūrat an-Nās', target: 1, text: TEXT_NAS },
      { name: 'Allāhumma aʿinnī ʿalā dhikrika...', target: 1, text: 'اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ' },
      { name: 'Rabbi qinī ʿadhābaka...', target: 1, text: 'رَبِّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ' },
      { name: 'Allāhumma ighfir lī...', target: 1, text: 'اللَّهُمَّ اغْفِرْ لِي مَا قَدَّمْتُ وَمَا أَخَّرْتُ وَمَا أَسْرَرْتُ وَمَا أَعْلَنْتُ وَمَا أَنْتَ أَعْلَمُ بِهِ مِنِّي أَنْتَ الْمُقَدِّمُ وَأَنْتَ الْمُؤَخِّرُ لَا إِلَٰهَ إِلَّا أَنْتَ' },
      { name: 'Subḥānaka Allāhumma wa biḥamdik...', target: 1, text: 'سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ أَسْتَغْفِرُكَ وَأَتُوبُ إِلَيْكَ' },
      { name: 'Rabbi ighfir lī wa tub ʿalayya', target: 1, text: 'رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ إِنَّكَ أَنْتَ التَّوَّابُ الْغَفُورُ' }
    ];

    function makeSalahList() {
      return SALAH_TEMPLATE.map(item => ({ ...item, current: 0 }));
    }

    function createFreshState() {
      return {
        mode: 'normal',
        normalCount: 0,
        salah: {
          currentIndex: 0,
          list: makeSalahList()
        }
      };
    }

    function parseState() {
      return createFreshState();
    }

    function saveState() {}

    function setMode(mode) {
      state.mode = mode;
      saveState();
      render();
    }

    function countNormalTap() {
      if (state.normalCount < 100) state.normalCount += 1;
    }

    function countSalahTap() {
      const s = state.salah;
      if (s.currentIndex >= s.list.length) return;

      const active = s.list[s.currentIndex];
      if (active.current < active.target) active.current += 1;
      if (active.current >= active.target) s.currentIndex += 1;
    }

    function getSalahProgressPercent() {
      const s = state.salah;
      const total = s.list.length;
      if (!total) return 0;
      if (s.currentIndex >= total) return 100;

      const active = s.list[s.currentIndex];
      const part = active.target > 0 ? active.current / active.target : 0;
      return ((s.currentIndex + part) / total) * 100;
    }

    function render() {
      const normalBtn = document.getElementById('normalBtn');
      const salahBtn = document.getElementById('salahBtn');
      const dhikrText = document.getElementById('dhikrText');
      const counter = document.getElementById('counter');
      const progress = document.getElementById('progress');

      normalBtn.classList.toggle('active', state.mode === 'normal');
      salahBtn.classList.toggle('active', state.mode === 'salah');

      if (state.mode === 'normal') {
        dhikrText.textContent = 'سُبْحَانَ ٱللَّٰهِ';
        counter.textContent = `${state.normalCount} / 100`;
        progress.style.width = `${(state.normalCount / 100) * 100}%`;
        dhikrText.style.direction = 'rtl';
        return;
      }

      const s = state.salah;

      if (s.currentIndex >= s.list.length) {
        dhikrText.textContent = 'تقبل الله';
        counter.textContent = 'ما شاء الله';
        progress.style.width = '100%';
        dhikrText.style.direction = 'rtl';
        return;
      }

      const active = s.list[s.currentIndex];
      dhikrText.textContent = active.text;
      counter.textContent = `${active.current} / ${active.target}`;
      progress.style.width = `${getSalahProgressPercent()}%`;
      dhikrText.style.direction = 'rtl';
      dhikrText.scrollTop = 0;
    }

    const state = parseState();

    document.getElementById('normalBtn').addEventListener('click', () => setMode('normal'));
    document.getElementById('salahBtn').addEventListener('click', () => setMode('salah'));

    let lastPointerTs = 0;
    document.body.addEventListener('pointerdown', (event) => {
      const now = performance.now();
      if (now - lastPointerTs < 120) return;
      lastPointerTs = now;

      if (state.mode === 'normal') {
        countNormalTap();
      } else {
        countSalahTap();
      }

      saveState();
      render();

      if (navigator.vibrate) navigator.vibrate(14);
    }, { passive: true });

    render();
  </script>
</body>
</html>
